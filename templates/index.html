<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>openrepertoire — Vortichess</title>
    
    <link rel="stylesheet" href="/static/css/chessboard.min.css">
    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/chessboard.min.js"></script>
    <script src="/static/js/chess.min.js"></script>
    
    <style>
        /* Palette Premium Dark Mode */
        :root {
            --bg-main: #161512;
            --bg-sidebar: #262421;
            --bg-card: #312e2b;
            --text-main: #bababa;
            --text-bright: #ffffff;
            --accent-blue: #3692e7;
            --accent-green: #45a049;
            --accent-red: #b33939;
            --border-color: #3d3a35;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; margin: 0; height: 100vh; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; }
        #sidebar { width: 340px; background: var(--bg-sidebar); padding: 20px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.3); }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 30px; overflow-y: auto; }
        
        h1#title { font-size: 22px; text-align: center; margin-top: 0; margin-bottom: 20px; color: var(--text-bright); font-style: italic; font-weight: 400; letter-spacing: 0.5px; }
        
        .sponsor-container { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed var(--border-color); }
        .sponsor-brand { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 8px; }
        .sponsor-logo-img { max-width: 140px; height: auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: transform 0.3s ease; }
        .sponsor-container:hover .sponsor-logo-img { transform: scale(1.05); }

        .btn { background: var(--accent-blue); color: white; border: none; padding: 12px 15px; border-radius: 6px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; font-size: 14px; transition: all 0.2s; }
        .btn:hover { background: #2575c0; }
        .btn-success { background: var(--accent-green); margin-top: 15px; }
        .btn-success:hover { background: #357a38; }
        .btn-read { background: #4f4b45; width: 48%; margin-top: 0; color: var(--text-bright); }
        .btn-read:hover { background: #635e56; }
        
        .sidebar-scroll { flex: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 15px; }
        
        h2 { font-size: 14px; margin: 15px 0 10px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; cursor: pointer; user-select: none; display: flex; justify-content: space-between; color: var(--text-bright); text-transform: uppercase; }
        h2:hover { color: var(--accent-blue); }
        
        .course-header { font-size: 13px; font-weight: 700; color: #fff; background: #4a453f; padding: 8px 12px; border-radius: 4px; margin: 10px 0 5px 0; text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between; }
        .var-container { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); margin-bottom: 6px; border-radius: 6px; border: 1px solid var(--border-color); padding: 8px 12px; transition: all 0.2s ease;}
        .var-item { flex: 1; cursor: pointer; font-size: 13px; color: #dfdfdf; }
        .var-item:hover { color: var(--accent-blue); }
        .btn-delete { background: transparent; color: #888; border: none; cursor: pointer; font-size: 12px; }
        .btn-delete:hover { color: var(--accent-red); }
        .empty-msg { color: #666; font-size: 13px; font-style: italic; }
        
        #workspace { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 40px; width: 100%; max-width: 1150px; }
        #left-col { display: flex; flex-direction: column; align-items: center; width: 500px; }
        #right-col { width: 420px; display: flex; flex-direction: column; gap: 15px; }
        
        #board { width: 500px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); border-radius: 4px; overflow: hidden; }
        #status { margin-top: 15px; font-size: 16px; font-weight: bold; min-height: 24px; text-align: center; color: var(--text-bright); }
        
        #read-controls { display: flex; justify-content: space-between; width: 100%; display: none; }
        #annotation-box { padding: 20px; background-color: var(--bg-card); border-left: 4px solid var(--accent-blue); border-radius: 6px; font-size: 15px; color: #e2e2e2; display: none; }
        
        .panel-box { background: var(--bg-card); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .panel-title { margin-top: 0; font-size: 13px; text-transform: uppercase; color: var(--text-bright); display: flex; justify-content: space-between; cursor: pointer;}
        
        .import-select { width: 100%; padding: 8px; margin-top: 8px; border-radius: 4px; background: var(--bg-sidebar); color: white; border: 1px solid var(--border-color); font-size: 13px; }
        
        .theme-wood .white-1e1d7 { background-color: #d18b47 !important; color: #704010 !important; }
        .theme-wood .black-3c85d { background-color: #704010 !important; color: #d18b47 !important; }
        .theme-green .white-1e1d7 { background-color: #eeeeee !important; color: #5c8766 !important; }
        .theme-green .black-3c85d { background-color: #5c8766 !important; color: #eeeeee !important; }
        .theme-dark .white-1e1d7 { background-color: #e2e4e6 !important; color: #4a4e52 !important; }
        .theme-dark .black-3c85d { background-color: #4a4e52 !important; color: #e2e4e6 !important; }

        .highlight-square { box-shadow: inset 0 0 0 3px #ff9f43 !important; }
        .san-link { color: #ff9f43; cursor: pointer; font-weight: bold; padding: 0 2px; }
        .san-link:hover { text-decoration: underline; background: rgba(255, 159, 67, 0.2); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sponsor-container">
            <div class="sponsor-brand">Sponsored by</div>
            <img src="/static/img/vortichess_logo.png" class="sponsor-logo-img" alt="Vortichess Logo" onerror="this.style.display='none'; document.getElementById('sponsor-fallback').style.display='block';"><div style="font-size: 22px; font-weight: 900; font-family: 'Montserrat', -apple-system, sans-serif; background: linear-gradient(45deg, #3692e7, #ff9f43); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 12px; letter-spacing: 2px; text-transform: uppercase; text-align: center;">VORTICHESS</div>
            <div id="sponsor-fallback" style="display:none; font-size:18px; font-weight:bold; color: #3692e7; font-style:italic; letter-spacing: 1px;">🌀 VORTICHESS</div>
        </div>

        <div class="sidebar-scroll">
            <h2 onclick="$('#learn-wrapper').slideToggle(200)">Da Imparare (<span id="learn-count">0</span>) <span>▼</span></h2>
            <div id="learn-wrapper"><div id="learn-list"></div></div>
            
            <h2 onclick="$('#review-wrapper').slideToggle(200)">Da Ripassare (<span id="review-count">0</span>) <span>▼</span></h2>
            <div id="review-wrapper"><div id="review-list"></div></div>

            <h2 onclick="$('#repertoire-wrapper').slideToggle(200)">Repertorio (<span id="rep-count">0</span>) <span>▼</span></h2>
            <div id="repertoire-wrapper" style="display: none;"><div id="repertoire-list"></div></div>
        </div>
        
        <div class="panel-box">
            <div class="panel-title" onclick="$('#theme-content').slideToggle(200)">Personalizza Grafica <span>▼</span></div>
            <div id="theme-content" style="display:none; margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px;">
                <label style="font-size: 11px; color: #888; display: block;">STILE CASE:</label>
                <select id="board-theme-select" class="import-select" onchange="changeBoardTheme()">
                    <option value="classic">Classico (Standard Marrone)</option>
                    <option value="wood">Legno Noce</option>
                    <option value="green">Verde Lichess / Torneo</option>
                    <option value="dark">Grigio Contrasto</option>
                </select>
            </div>
        </div>
        
        <div class="panel-box" style="margin-bottom:0;">
            <div class="panel-title" onclick="$('#import-content').slideToggle(200)">Importa Corso (PGN) <span>▼</span></div>
            <div id="import-content" style="display:none; margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px;">
                <select id="pgn-perspective" class="import-select">
                    <option value="white">Bianco ⚪</option>
                    <option value="black">Nero ⚫</option>
                </select>
                <input type="file" id="pgn-file" accept=".pgn" style="color:#888; margin-top: 8px; width: 100%;">
                <button class="btn" onclick="importPGNFile()">Carica File</button>
            </div>
        </div>
    </div>

    <div id="main">
        <h1 id="title">Seleziona una variante per iniziare</h1>
        
        <div id="workspace">
            <div id="left-col">
                <div id="board"></div>
                <div style="display: flex; justify-content: center; width: 100%; margin-top: 12px;">
                    <button class="btn" onclick="analyzeOnLichess()" style="background: #312e2b; color: #bababa; border: 1px solid var(--border-color); width: auto; font-size: 12px; margin-top: 0; padding: 6px 16px;">🔍 Analizza su Lichess</button>
                </div>
                <div id="status"></div>
            </div>
            
            <div id="right-col">
                <div id="read-controls">
                    <button class="btn btn-read" onclick="prevMoveRead()">⬅️ Indietro</button>
                    <button class="btn btn-read" onclick="nextMoveRead()">Avanti (Spazio) ➡️</button>
                </div>
                <div id="annotation-box"></div>
            </div>
        </div>
    </div>

<script>
    let board = null;
    let game = new Chess();
    let previewGame = new Chess(); 
    let currentVariation = null;
    let moveIndex = 0;
    
    // Gestione Stati e Chessable Errors
    let phase = 'NONE';
    let madeMistake = false;
    let mistakeReviewQueue = []; 
    let mistakeReviewRound = 0;        // NUOVO: Conta 0, 1, 2 (i tre cicli)
    let currentMistakeIdxInQueue = 0;  // NUOVO: A che errore siamo nel ciclo corrente
    let waitingForAck = false;   
    
    let globalVariantsMap = {};
    let expandedCourses = {}; 
    let selectedSquare = null; 
    let cachedLists = { learn: [], review: [], repertoire: [] };
    let currentListMode = ''; 
    
    // PREVIEW INTELLIGENTE
    let isPreviewing = false;

    function clearPreview() {
        if (isPreviewing) {
            $('#preview-alert').remove(); 
            isPreviewing = false;
            board.position(game.fen(), false); 
        }
    }

    function changeBoardTheme() {
        let theme = $('#board-theme-select').val();
        $('#board').removeClass('theme-wood theme-green theme-dark');
        if (theme !== 'classic') $('#board').addClass('theme-' + theme);
    }

    function initBoard() {
        var config = { draggable: true, position: 'start', onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd, pieceTheme: '/static/img/chesspieces/wikipedia/{piece}.png' };
        board = Chessboard('board', config);
        changeBoardTheme();
    }

    function toggleCourse(id) {
        $('#' + id).slideToggle(200, function() { expandedCourses[id] = $(this).is(':visible'); });
    }

    function removeHighlights() { $('#board .square-55d63').removeClass('highlight-square'); selectedSquare = null; }
    function highlightSquare(square) { removeHighlights(); $('#board .square-' + square).addClass('highlight-square'); selectedSquare = square; }

    function renderList(dataArray, listId, mode) {
        let list = $(`#${listId}`);
        list.empty();
        if (dataArray.length === 0) { list.append('<p class="empty-msg">Nessuna variante presente.</p>'); return; }

        let grouped = {};
        dataArray.forEach(v => {
            globalVariantsMap[v.id] = v; 
            let courseName = v.course || 'Varie';
            let sideTag = v.perspective === 'black' ? '⚫ ' : '⚪ ';
            v.displayTitle = sideTag + v.title;
            if (!grouped[courseName]) grouped[courseName] = [];
            grouped[courseName].push(v);
        });

        for (let course in grouped) {
            let safeId = course.replace(/[^a-zA-Z0-9]/g, '_') + '_' + listId;
            let isExpanded = expandedCourses[safeId];
            if (isExpanded === undefined) isExpanded = (listId === 'repertoire-list') ? false : true;
            let displayStyle = isExpanded ? 'block' : 'none';

            list.append(`<div class="course-header" onclick="toggleCourse('${safeId}')">${course} <span>▼</span></div>`);
            let courseDiv = $(`<div id="${safeId}" class="course-content" style="display: ${displayStyle};"></div>`);
            
            grouped[course].forEach(v => {
                let onClickAction = mode === 'read' ? `startReadMode('${v.id}', 'repertoire')` : `startTraining('${v.id}', '${mode}')`;
                courseDiv.append(`
                    <div class="var-container" data-var-id="${v.id}">
                        <div class="var-item" onclick="${onClickAction}">${v.displayTitle}</div>
                        <button class="btn-delete" onclick="deleteVariation('${v.id}', event)">✕</button>
                    </div>
                `);
            });
            list.append(courseDiv);
        }
    }

    function loadDueVariations() {
        $.get('/api/due', function(data) {
            cachedLists = { learn: data.learn, review: data.review, repertoire: data.repertoire };
            $('#learn-count').text(data.learn.length);
            $('#review-count').text(data.review.length);
            $('#rep-count').text(data.repertoire.length);
            globalVariantsMap = {}; 
            renderList(data.learn, 'learn-list', 'learn');
            renderList(data.review, 'review-list', 'review');
            renderList(data.repertoire, 'repertoire-list', 'read');
            highlightActiveVar();
        });
    }

    function importPGNFile() {
        let fileInput = document.getElementById('pgn-file');
        let perspectiveInput = document.getElementById('pgn-perspective');
        if (fileInput.files.length === 0) return alert("Seleziona un file!");
        let reader = new FileReader();
        reader.onload = function(e) {
            $.ajax({
                url: '/api/import', type: 'POST', contentType: 'application/json',
                data: JSON.stringify({ pgn: e.target.result, course: fileInput.files[0].name.replace(/\.[^/.]+$/, ""), perspective: perspectiveInput.value }),
                success: function(res) { alert(`Corso importato!\n${res.imported} varianti aggiunte.`); fileInput.value = ""; loadDueVariations(); }
            });
        };
        reader.readAsText(fileInput.files[0]);
    }

    function deleteVariation(id, event) {
        event.stopPropagation();
        if (confirm("Eliminare definitivamente?")) {
            $.ajax({
                url: '/api/delete', type: 'POST', contentType: 'application/json', data: JSON.stringify({id: id}),
                success: function(res) {
                    if (res.success) {
                        loadDueVariations();
                        if (currentVariation && currentVariation.id === id) {
                            currentVariation = null; board.start(); $('#title').text("Seleziona una variante");
                            $('#status').text(""); $('#annotation-box').hide(); $('#read-controls').hide();
                        }
                    }
                }
            });
        }
    }

    function getNextVariation() {
        let list = cachedLists[currentListMode] || [];
        let idx = list.findIndex(v => v.id === currentVariation.id);
        return (idx !== -1 && idx + 1 < list.length) ? list[idx + 1] : null;
    }

    function highlightActiveVar() {
        $('.var-container').css({'border-left': '1px solid var(--border-color)', 'background': 'var(--bg-card)'});
        $('.var-item').css({'color': '#dfdfdf', 'font-weight': 'normal'});
        if (currentVariation) {
            $(`.var-container[data-var-id="${currentVariation.id}"]`).css({'border-left': '3px solid var(--accent-blue)', 'background': '#393f45'});
            $(`.var-container[data-var-id="${currentVariation.id}"] .var-item`).css({'color': 'var(--accent-blue)', 'font-weight': 'bold'});
        }
    }

    // --- READ MODE ---
    function startReadMode(id, modeContext) {
        removeHighlights();
        isPreviewing = false; 
        currentListMode = modeContext;
        currentVariation = globalVariantsMap[id];
        moveIndex = 0; phase = 'READ'; waitingForAck = false;
        highlightActiveVar();

        game.reset(); 
        board.orientation(currentVariation.perspective); 
        board.position('start', false); 
        $('#title').text("Lettura: " + currentVariation.title);
        $('#status').hide(); $('#read-controls').show(); updateReadModeUI();
    }

    function nextMoveRead() {
        clearPreview(); 
        if (moveIndex < currentVariation.moves.length) {
            let move = currentVariation.moves[moveIndex];
            game.move({from: move.uci.substring(0,2), to: move.uci.substring(2,4), promotion: 'q'});
            board.position(game.fen()); 
            moveIndex++; updateReadModeUI();
        }
    }
    
    function prevMoveRead() {
        clearPreview(); 
        if (moveIndex > 0) { 
            game.undo(); 
            board.position(game.fen()); 
            moveIndex--; 
            updateReadModeUI(); 
        }
    }

    function updateReadModeUI() {
        removeHighlights();
        if (moveIndex === 0) {
            $('#annotation-box').html("<em>Inizio variante. Usa lo Spazio o le frecce della tastiera per scorrere. Tasto F per girare.</em>").show();
        } else {
            if (moveIndex === currentVariation.moves.length) {
                showSummary(); 
            } else {
                let move = currentVariation.moves[moveIndex-1];
                let sidePlayed = ((moveIndex-1) % 2 === 0) ? "Bianco" : "Nero";
                let text = `<div style="font-size:16px;">Mossa del <strong>${sidePlayed}</strong>: <strong style="color:var(--accent-blue); font-size: 18px;">${move.san}</strong></div>`;
                if (move.comment) text += `<div style="margin-top:10px; color: #cdcdcd;">${parseCommentMoves(move.comment, moveIndex-1).replace(/\n/g, '<br>')}</div>`;
                $('#annotation-box').html(text).show();
                waitingForAck = false;
            }
        }
    }

    // --- TRAINING (CHESSABLE STYLE) ---
    function startTraining(id, modeContext) {
        removeHighlights();
        isPreviewing = false; 
        currentListMode = modeContext;
        currentVariation = globalVariantsMap[id];
        moveIndex = 0;
        phase = (currentVariation.srs.rep === 0) ? 'LEARN' : 'REVIEW';
        madeMistake = false;
        mistakeReviewQueue = [];
        mistakeReviewRound = 0;
        currentMistakeIdxInQueue = 0;
        waitingForAck = false;
        highlightActiveVar();

        game.reset(); 
        board.orientation(currentVariation.perspective); 
        board.position('start', false); 
        $('#status').show().text(""); $('#read-controls').hide();
        updateTitle(); handleStep();
    }

    function updateTitle() {
        let sideText = currentVariation.perspective === 'white' ? " (Lato Bianco)" : " (Lato Nero)";
        if (phase === 'CONSOLIDATE') $('#title').text("Fase 2: " + currentVariation.title + sideText);
        else $('#title').text((phase === 'LEARN' ? "Fase 1: " : "Ripasso: ") + currentVariation.title + sideText);
    }

    function checkUserTurn() { return currentVariation.perspective === 'white' ? (moveIndex % 2 === 0) : (moveIndex % 2 !== 0); }

    function handleStep() {
        removeHighlights();

        if (phase === 'REVIEW_ERRORS') {
            if (mistakeReviewQueue.length === 0) { showSummary(); return; }
            let missedIdx = mistakeReviewQueue[currentMistakeIdxInQueue];
            moveIndex = missedIdx; 
            
            game.reset();
            for(let i=0; i<missedIdx; i++) {
                let m = currentVariation.moves[i];
                game.move({from: m.uci.substring(0,2), to: m.uci.substring(2,4), promotion: 'q'});
            }
            board.position(game.fen(), false); 
            
            let expectedMove = currentVariation.moves[missedIdx];
            $('#status').text(`Errore ${currentMistakeIdxInQueue + 1}/${mistakeReviewQueue.length} (Ciclo ${mistakeReviewRound + 1}/3): tocca a te`).css('color', '#ff9f43');
            $('#annotation-box').hide();
            return; 
        }

        if (moveIndex >= currentVariation.moves.length) {
            if (phase === 'LEARN') {
                $('#status').text("Spiegazione terminata!").css('color', 'var(--accent-blue)');
                phase = 'CONSOLIDATE'; waitingForAck = true; 
                $('#annotation-box').html(`
                    <strong style="color: var(--text-bright);">Ottimo lavoro!</strong><br><br>
                    Hai letto le idee dietro questa linea.<br>Ora giocala di fila a memoria.<br>
                    <button class="btn btn-success" id="btn-start-consolidation">Inizia Consolidamento (Spazio)</button>
                `).show();
                
                $('#btn-start-consolidation').click(function() {
                    clearPreview(); 
                    $('#annotation-box').hide(); waitingForAck = false;
                    moveIndex = 0; game.reset(); board.position('start', false); updateTitle(); handleStep(); 
                });
                return;
            } else if (phase === 'CONSOLIDATE' || phase === 'REVIEW') {
                if (mistakeReviewQueue.length > 0) {
                    phase = 'REVIEW_ERRORS'; 
                    // Assicura l'ordine cronologico degli errori nella variante
                    mistakeReviewQueue.sort((a, b) => a - b);
                    mistakeReviewRound = 0;
                    currentMistakeIdxInQueue = 0;
                    $('#status').text("Fase di revisione errori in avvio...").css('color', '#ff9f43');
                    setTimeout(handleStep, 1000);
                    return;
                } else { showSummary(); return; }
            }
        }

        let expectedMove = currentVariation.moves[moveIndex];
        let isUserTurn = checkUserTurn(); 
        let hasComment = expectedMove.comment && expectedMove.comment.trim() !== "";
        let myColorName = currentVariation.perspective === 'white' ? 'Bianco' : 'Nero';
        let oppColorName = currentVariation.perspective === 'white' ? 'Nero' : 'Bianco';

        if (isUserTurn) {
            $('#status').text(`Tocca a te (${myColorName})`).css('color', 'var(--text-bright)');
            if (phase === 'LEARN') {
                waitingForAck = true; 
                let targetMoveHTML = `<div style="font-size: 16px; color: var(--text-bright); margin-bottom: 10px;">Cosa giocare ora: <strong style="font-size: 22px; color: var(--accent-blue);">${expectedMove.san}</strong></div>`;
                let commentHTML = hasComment ? `<div style="margin-bottom: 15px; color: #bbb;">${parseCommentMoves(expectedMove.comment, moveIndex).replace(/\n/g, '<br>')}</div>` : '';
                $('#annotation-box').html(`${targetMoveHTML}${commentHTML}<button class="btn" id="btn-avanti">Fammi muovere (Spazio)</button>`).show();
                
                $('#btn-avanti').click(function() { 
                    clearPreview(); 
                    waitingForAck = false; 
                    $('#annotation-box').hide(); 
                });
            } else { waitingForAck = false; $('#annotation-box').hide(); }
        } else {
            $('#status').text(`Mossa del computer (${oppColorName})...`).css('color', '#888');
            if (phase === 'LEARN' && hasComment) {
                waitingForAck = true;
                $('#annotation-box').html(`
                    <div style="font-size: 16px; color: var(--text-bright); margin-bottom: 10px;">Il computer gioca: <strong style="font-size: 18px; color: #ff9f43;">${expectedMove.san}</strong></div>
                    <div style="margin-bottom: 15px; color: #bbb;">${parseCommentMoves(expectedMove.comment, moveIndex).replace(/\n/g, '<br>')}</div>
                    <button class="btn" id="btn-avanti">Avanti (Spazio)</button>
                `).show();
                
                $('#btn-avanti').click(function() { 
                    clearPreview(); 
                    waitingForAck = false; 
                    $('#annotation-box').hide(); 
                    executeComputerMove(); 
                });
            } else {
                waitingForAck = false; $('#annotation-box').hide(); window.setTimeout(executeComputerMove, 400);
            }
        }
    }

    function executeComputerMove() {
        let expectedMove = currentVariation.moves[moveIndex];
        game.move({from: expectedMove.uci.substring(0,2), to: expectedMove.uci.substring(2,4), promotion: 'q'});
        board.position(game.fen()); 
        moveIndex++; handleStep();
    }

    function evaluateUserMove(source, target, isDragDrop) {
        clearPreview(); 
        removeHighlights();
        if (source === target) return false; 
        
        let attemptedMove = source + target; 
        let expectedMove = currentVariation.moves[moveIndex]; 
        
        let move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return false; 

        if (attemptedMove !== expectedMove.uci.substring(0,4)) {
            game.undo(); 
            madeMistake = true;
            
            if (phase === 'REVIEW_ERRORS') {
                mistakeReviewRound = 0; 
                currentMistakeIdxInQueue = 0;
                $('#status').text(`Sbagliato! La mossa era ${expectedMove.san}. Ripartiamo col Ciclo 1.`).css('color', 'var(--accent-red)');
                board.position(game.fen(), false); 
                return false; 
            } else {
                if (!mistakeReviewQueue.includes(moveIndex)) mistakeReviewQueue.push(moveIndex);
                
                $('#status').text(`Sbagliato!`).css('color', 'var(--accent-red)');
                let targetMoveHTML = `<div style="font-size: 16px; color: var(--accent-red); margin-bottom: 10px;">Devi giocare: <strong style="font-size: 22px;">${expectedMove.san}</strong></div>`;
                let commentHTML = expectedMove.comment ? `<div style="margin-top: 10px; color: #bbb;"><strong>Suggerimento:</strong><br>${parseCommentMoves(expectedMove.comment, moveIndex).replace(/\n/g, '<br>')}</div>` : '';
                $('#annotation-box').html(targetMoveHTML + commentHTML).show();
                board.position(game.fen(), false); 
                return false; 
            }
        }

        if (phase === 'REVIEW_ERRORS') {
            currentMistakeIdxInQueue++;
            if (currentMistakeIdxInQueue >= mistakeReviewQueue.length) {
                currentMistakeIdxInQueue = 0;
                mistakeReviewRound++;
            }

            if (mistakeReviewRound >= 3) {
                mistakeReviewQueue = []; // Azzera la coda per innescare la fine
                $('#status').text("Corretto! Revisione errori completata.").css('color', 'var(--accent-green)');
            } else {
                $('#status').text("Corretto!").css('color', 'var(--accent-green)');
            }

            if (!isDragDrop) board.position(game.fen(), false); 
            setTimeout(handleStep, 600); 
            return true;
        } else {
            $('#status').text("Corretto!").css('color', 'var(--accent-green)');
            $('#annotation-box').hide();
            moveIndex++; 
            if (!isDragDrop) board.position(game.fen(), false); 
            handleStep();
            return true;
        }
    }

    // --- NUOVO MOTORE PREVIEW INTELLIGENTE ---
    function parseCommentMoves(comment, baseMoveIndex) {
        return comment.replace(/\b([KQRBN]?[a-h]?[1-8]?x?[a-h][1-8](?:=[KQRBN])?[\+#]?|O-O(?:-O)?)\b/g, `<span class="san-link" onclick="previewMove('$&', event, ${baseMoveIndex})" title="Clicca per visualizzare">$&</span>`);
    }

    function previewMove(san, event, baseMoveIndex) {
        if (event) event.stopPropagation();

        if (!isPreviewing) {
            previewGame.reset();
            for(let i=0; i<baseMoveIndex; i++) {
                if (i < currentVariation.moves.length) {
                    let m = currentVariation.moves[i];
                    previewGame.move({from: m.uci.substring(0,2), to: m.uci.substring(2,4), promotion: 'q'});
                }
            }
        }

        let move = previewGame.move(san);

        if (!move) {
            previewGame.reset();
            for(let i=0; i<=baseMoveIndex; i++) {
                if (i < currentVariation.moves.length) {
                    let m = currentVariation.moves[i];
                    previewGame.move({from: m.uci.substring(0,2), to: m.uci.substring(2,4), promotion: 'q'});
                }
            }
            move = previewGame.move(san);
        }

        if (!move) {
            previewGame.reset();
            for(let i=0; i<baseMoveIndex; i++) {
                if (i < currentVariation.moves.length) {
                    let m = currentVariation.moves[i];
                    previewGame.move({from: m.uci.substring(0,2), to: m.uci.substring(2,4), promotion: 'q'});
                }
            }
            move = previewGame.move(san);
        }

        if (move) {
            isPreviewing = true;
            board.position(previewGame.fen(), false); 
            
            if ($('#preview-alert').length === 0) {
                $('#annotation-box').append(`<div id="preview-alert" style="margin-top: 15px; padding: 10px; background: rgba(179, 57, 57, 0.2); border: 1px dashed var(--accent-red); color: #ffcccc; border-radius: 6px; text-align: center; cursor: pointer; font-weight: bold; transition: background 0.2s;" onmouseover="this.style.background='rgba(179,57,57,0.4)'" onmouseout="this.style.background='rgba(179,57,57,0.2)'" onclick="clearPreview()">👀 Mossa secondaria visibile.<br>Clicca qui o interagisci per tornare alla linea principale.</div>`);
            }
        } else {
            console.log("Mossa (" + san + ") non giocabile a partire da questo bivio.");
        }
    }

    function jumpToMove(targetIndex) {
        clearPreview(); 
        game.reset();
        for(let i=0; i<targetIndex; i++) {
            let m = currentVariation.moves[i];
            game.move({from: m.uci.substring(0,2), to: m.uci.substring(2,4), promotion: 'q'});
        }
        board.position(game.fen(), false); 
    }

    function showSummary() {
        $('#status').text("Riepilogo Variante").css('color', 'var(--accent-blue)');
        
        let html = `<div style="font-size: 15px; margin-bottom: 15px; color: var(--accent-green); font-weight: bold;">Variante Completata!</div>`;
        html += `<div style="line-height: 1.8; font-size: 14px; text-align: left; color: #ddd; max-height: 250px; overflow-y: auto; padding-right: 10px; background: #262421; padding: 10px; border-radius: 6px;">`;
        
        game.reset();
        for(let i=0; i<currentVariation.moves.length; i++) {
            let m = currentVariation.moves[i];
            let moveNum = Math.floor(i/2) + 1;
            let moveStr = (i%2 === 0) ? `${moveNum}. ${m.san}` : `${moveNum}... ${m.san}`;
            
            html += `<strong class="san-link" onclick="jumpToMove(${i + 1})">${moveStr}</strong> `;
            if (m.comment) { html += `<span style="color: #999; font-style: italic;">{ ${parseCommentMoves(m.comment, i)} }</span> `; }
        }
        html += `</div><hr style="border-color: var(--border-color); margin: 15px 0;">`;
        
        let nextVar = getNextVariation();
        if (nextVar) html += `<button class="btn btn-success" id="btn-next-var">Prossima Variante (Spazio)</button>`;
        else html += `<div style="font-style:italic; color: #888; text-align:center;">Hai concluso questo elenco.</div>`;
        
        $('#annotation-box').html(html).show();
        $('#read-controls').hide(); 
        
        if (phase !== 'READ' && !currentVariation.reviewedFlag) {
            currentVariation.reviewedFlag = true; 
            let quality = madeMistake ? 1 : 5;
            $.ajax({
                url: '/api/review', type: 'POST', contentType: 'application/json',
                data: JSON.stringify({id: currentVariation.id, quality: quality}),
                success: function() { loadDueVariations(); }
            });
        }

        if (nextVar) {
            waitingForAck = true;
            $('#btn-next-var').click(function() {
                clearPreview(); 
                if(phase === 'READ') startReadMode(nextVar.id, currentListMode);
                else startTraining(nextVar.id, currentListMode);
            });
        } else { waitingForAck = false; }
    }

    // --- DRAG E DROP SULLA SCACCHIERA ---
    function onDragStart (source, piece) {
        if (isPreviewing) { clearPreview(); return false; } 
        
        removeHighlights();
        if (phase === 'READ' || waitingForAck || game.game_over() || !currentVariation) return false;
        let requiredColorPrefix = currentVariation.perspective === 'white' ? '^w' : '^b';
        if (piece.search(requiredColorPrefix) === -1) return false; 
    }
    
    function onDrop (source, target) {
        if (!currentVariation || waitingForAck || source === target) return 'snapback';
        let success = evaluateUserMove(source, target, true); 
        if (!success) return 'snapback'; 
    }
    
    function onSnapEnd () { board.position(game.fen(), false); } 
    
    function analyzeOnLichess() {
        if (game) { window.open("https://lichess.org/analysis/standard/" + game.fen().replace(/ /g, '_'), '_blank'); }
    }

    $('#board').on('click', '.square-55d63', function() {
        if (isPreviewing) { clearPreview(); return; } 

        if (phase === 'READ' || waitingForAck || !currentVariation || game.game_over()) return;
        if (!checkUserTurn()) return;

        let square = $(this).attr('data-square');
        let piece = game.get(square);
        let userColor = currentVariation.perspective === 'white' ? 'w' : 'b';

        if (selectedSquare === null) {
            if (piece && piece.color === userColor) highlightSquare(square);
        } else {
            if (selectedSquare === square) removeHighlights();
            else if (piece && piece.color === userColor) highlightSquare(square);
            else {
                let success = evaluateUserMove(selectedSquare, square, false); 
                if (success || madeMistake) removeHighlights(); 
            }
        }
    });

    // TASTIERA
    $(document).on('keydown', function(event) {
        if (event.key === 'f' || event.key === 'F') { if (board) { event.preventDefault(); board.flip(); } return; }
        if (phase === 'READ') {
            if (event.code === 'ArrowRight' || event.code === 'Space') { event.preventDefault(); nextMoveRead(); }
            else if (event.code === 'ArrowLeft') { event.preventDefault(); prevMoveRead(); }
        } else {
            if (event.code === 'Space' || event.key === ' ') {
                let btnAvanti = $('#btn-avanti');
                let btnConsolidamento = $('#btn-start-consolidation');
                let btnNext = $('#btn-next-var');
                
                if (btnAvanti.length && btnAvanti.is(':visible')) { event.preventDefault(); btnAvanti.click(); } 
                else if (btnConsolidamento.length && btnConsolidamento.is(':visible')) { event.preventDefault(); btnConsolidamento.click(); }
                else if (btnNext.length && btnNext.is(':visible')) { event.preventDefault(); btnNext.click(); }
            }
        }
    });

    $(document).ready(function() { initBoard(); loadDueVariations(); });
</script>
</body>
